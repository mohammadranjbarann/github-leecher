name:  انتقال فایل به گیت هاب

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل مورد نظر'
        required: true
        type: string
      zip_password:
        description: 'رمز عبور برای فایل فشرده'
        required: true
        type: string

permissions:
  contents: write

jobs:
  leech-split-file: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # آپدیت شده به v5
        with:
          fetch-depth: 1 

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download file
        run: |
          curl -L --fail --retry 3 -o downloaded_file "${{ github.event.inputs.file_url }}"
          echo "File downloaded. Size: $(ls -lh downloaded_file | awk '{print $5}')"

      - name: Extract original filename
        id: get_filename
        run: |
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d '?' -f1)
          [ -z "$ORIGINAL_NAME" ] && ORIGINAL_NAME="downloaded_file_archive" # نام پیش‌فرض اگر قابل استخراج نبود
          echo "Original filename will be used for archive: $ORIGINAL_NAME"
          echo "::set-output name=original_name::$ORIGINAL_NAME" # برای استفاده در مراحل بعدی

      - name: Create password-protected multi-part archive (85MB chunks)
        run: |
          7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=3 -v85m "sci-hub.ir_${{ steps.get_filename.outputs.original_name }}.7z" downloaded_file
          echo "Archive created successfully."

      - name: Remove original downloaded file
        run: rm -f downloaded_file

      # کانفیگ Git برای استفاده از اکانت گیت‌هاب اکشن
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" # استفاده از GITHUB_TOKEN برای احراز هویت

      # آماده‌سازی برای Push کردن
      - name: Prepare for commit
        run: |
          # افزودن تمام فایل‌های آرشیو به Git
          git add sci-hub.ir_${{ steps.get_filename.outputs.original_name }}.7z.*
          echo "Added archive chunks to staging."

       # ... (مراحل قبلی مثل دانلود و استخراج)

      - name: Commit and Push chunks
        run: |
          # افزودن تمام فایل‌های آرشیو به Git
          git add sci-hub.ir_${{ steps.get_filename.outputs.original_name }}.7z.*
          echo "Added all archive chunks to staging."

          # بررسی کنید آیا تغییری برای کامیت وجود دارد
          if ! git diff --staged --quiet; then
            # کامیت کردن تمام تغییرات یکباره
            git commit -m "Add all archive chunks for ${{ steps.get_filename.outputs.original_name }}"
            echo "Committed all archive chunks."

            # Push کردن تمام تغییرات با تلاش مجدد
            push_success=false
            # ما اینجا تعداد تلاش‌ها رو بیشتر می‌کنیم چون یک push بزرگ داریم
            for attempt in {1..15}; do
              echo "Attempt $attempt to push all changes..."
              # سعی می‌کنیم بدون force push کنیم. اگر موفق نشد، بعداً force-with-lease رو امتحان می‌کنیم
              if git push origin HEAD; then
                echo "Push successful."
                push_success=true
                break
              else
                echo "Push failed on attempt $attempt. Retrying in 20 seconds..."
                sleep 20
                # سعی می‌کنیم قبل از تلاش مجدد، ریپو رو آپدیت کنیم
                # ولی چون ما فقط اضافه کردیم و کسی دیگه کامیت نکرده، این ممکنه لازم نباشه
                # اگر لازم بود: git fetch origin && git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
              fi
            done

            if [ "$push_success" = false ]; then
              echo "Failed to push all chunks after multiple attempts. Attempting force push..."
              # اگر push معمولی ناموفق بود، از force-with-lease استفاده می‌کنیم
              # این باید با احتیاط استفاده شود، اما برای workflow که فقط اضافه می‌کند، معمولاً امن است
              if git push origin HEAD --force-with-lease; then
                echo "Force push successful."
                push_success=true
              else
                echo "Force push also failed. Aborting."
                exit 1 # پایان دادن به workflow با خطا
              fi
            fi
          else
            echo "No changes to commit or push."
          fi
  
